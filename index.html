<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Coaching — Yoann Desgrand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #080808; --surface: #111111; --surface2: #161616;
        --border: #222222; --gold: #C4973A; --gold-light: #E2B95A;
        --text: #F0EAE0; --muted: #7a7065; --dim: #2a2520;
        --radius: 12px; --success: #4ade80; --error: #f87171;
      }
      body {
        background: var(--bg); color: var(--text);
        font-family: 'Outfit', sans-serif; font-weight: 300;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
